---
tailscale_authkey: "dummy"
username: alex
group: alex
podman_data_dir: "/var/opt"
default_quadlet_options:
  - AutoUpdate=registry
  - Pull=missing
  - |
    [Unit]
    After=network-online.target nss-lookup.target autofs.service

    [Service]
    Restart=always

    [Install]
    WantedBy=default.target
default_podman_interface: "podman1"
timezone: "America/New_York"
dropbear_authorized_key: "{{ lookup('pipe', lookup('community.general.passwordstore', 'Repositories/arch-base-infra/get_ssh_pubkey')) }}"
puppet_server: "{{ lookup('community.general.passwordstore', 'Repositories/arch-base-infra/puppet_server') }}"
mailgun_user: "{{ lookup('community.general.passwordstore', 'Repositories/arch-base-infra/mailgun_user') }}"
mailgun_password: "{{ lookup('community.general.passwordstore', 'Repositories/arch-base-infra/mailgun_password') }}"
mailgun_from: "{{ lookup('community.general.passwordstore', 'Repositories/arch-base-infra/mailgun_from') }}"
notification_email: "{{ lookup('community.general.passwordstore', 'Repositories/arch-base-infra/notification_email') }}"
