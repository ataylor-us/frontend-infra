---
- name: Set up arch box
  hosts: all
  roles:
    - system
    - editor
    - backups
    - firewall
    - containers
    - terminal
    - role: artis3n.tailscale.machine
      when: "'staging' not in group_names"
    - notifications
    - file_manager
    - mounts
    - reverse_proxy
    - dashboard_server
    - file_sync_server
    - budget_server
    - recipe_server
    - feed_server
    - photo_server
    - bookmark_server
    - document_server
    - version_control_server
