---
unas_uid: 977
unas_gid: 988
lan_borg_repo: "{{ unas2_ip }}:/var/nfs/shared/borg"
autofs_mounts: []
samba_shares:
  - name: paperless_consume
    comment: Paperless consume
    owner: "{{ username }}"
    group: "{{ group }}"
    directory_mode: "0755"
    valid_users: epson
    write_list: epson
    user: "{{ username }}"
  - name: ludusavi
    comment: Game save backups
    owner: "{{ username }}"
    group: "{{ group }}"
    directory_mode: "0755"
    valid_users: gamepc
    write_list: gamepc
    user: "{{ username }}"
samba_users:
  - name: epson
    password: "{{ epson_smb_password }}"
  - name: gamepc
    password: "{{ gamepc_smb_password }}"
