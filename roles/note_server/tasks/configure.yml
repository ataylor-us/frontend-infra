---
- name: Create data directory
  become: true
  ansible.builtin.file:
    group: 1000
    mode: "0755"
    owner: 1000
    path: "{{ podman_data_dir }}/memos"
    state: directory
- name: Create a Quadlet file
  become: true
  no_log: true
  containers.podman.podman_container:
    name: memos
    image: docker.io/neosmemo/memos:{{ memos_version }}
    state: quadlet
    quadlet_filename: "{{ project_name }}-container"
    user: 1000:1000
    network: "{{ default_podman_interface }}"
    ports:
      - 127.0.0.1:{{ memos_port }}:5230
    volumes:
      - "{{ podman_data_dir }}/memos:/var/opt/memos:rw,z"
    env:
      TZ: "{{ timezone }}"
      MEMOS_DRIVER: postgres
      MEMOS_DSN: "postgres://{{ memos_db_user }}:{{ memos_db_password }}@{{ memos_db_host }}:5432/{{ memos_db_name }}?sslmode=disable"
      MEMOS_INSTANCE_URL: "{{ memos_external_url }}"
    labels:
      managed-by: ansible
      part-of: "{{ project_name }}"
    quadlet_options: "{{ default_quadlet_options }}"
  notify:
    - Reload systemd for memos
    - Restart memos
- name: Flush handlers
  ansible.builtin.meta: flush_handlers
- name: Generate Caddyfile
  become: true
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: "/etc/caddy/conf.d/{{ project_name }}.Caddyfile"
    group: caddy
    mode: "0644"
    owner: caddy
  notify:
    - Reload systemd for memos
    - Restart memos
- name: Flush handlers
  ansible.builtin.meta: flush_handlers
- name: Copy borgmatic config
  become: true
  ignore_errors: true
  ansible.builtin.template:
    dest: "/etc/borgmatic.d/{{ project_name }}.yaml"
    group: root
    mode: "0600"
    owner: root
    src: config.yaml.j2
