---
- name: Create gitea conf directory
  become: true
  ansible.builtin.file:
    group: 1000
    mode: "0755"
    owner: 1000
    path: "{{ service_data_dir }}/gitea/conf"
    state: directory
- name: Create a Quadlet file
  become: true
  containers.podman.podman_container:
    name: forgejo
    image: codeberg.org/forgejo/forgejo:{{ forgejo_version }}
    state: quadlet
    quadlet_filename: "{{ project_name }}-container"
    network: "{{ default_podman_interface }}"
    env:
      USE_UID: 1000
      USE_GID: 1000
    ports:
      - 127.0.0.1:{{ forgejo_port }}:{{ forgejo_port }}
    volumes:
      - "{{ service_data_dir }}:/data:rw,rslave"
      - /etc/localtime:/etc/localtime:ro,z
    labels:
      managed-by: ansible
      part-of: "{{ project_name }}"
    quadlet_options: "{{ nfs_quadlet_options }}"
  notify:
    - Reload systemd for forgejo
    - Restart forgejo
- name: Copy app.ini
  become: true
  ansible.builtin.template:
    src: app.ini.j2
    dest: "{{ service_data_dir }}/gitea/conf/app.ini"
    group: 1000
    mode: "0644"
    owner: 1000
  notify:
    - Reload systemd for forgejo
    - Restart forgejo
- name: Flush handlers
  ansible.builtin.meta: flush_handlers
- name: Generate Caddyfile
  become: true
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: "/etc/caddy/conf.d/{{ project_name }}.Caddyfile"
    group: caddy
    mode: "0644"
    owner: caddy
  notify:
    - Reload systemd for forgejo
    - Restart forgejo
- name: Flush handlers
  ansible.builtin.meta: flush_handlers
