---
project_name: paperless
# renovate: datasource=docker depName=docker.io/library/redis
paperless_redis_version: "8@sha256:2838d5524559494f6f1cd66e97e76b200d64a633a8614200620755ed395daf32"
# renovate: datasource=docker depName=ghcr.io/paperless-ngx/paperless-ngx
paperless_server_version: "2.20.15@sha256:6c86cad803970ea782683a8e80e7403444c5bf3cf70de63b4d3c8e87500db92f"
# renovate: datasource=docker depName=docker.io/gotenberg/gotenberg
paperless_gotenberg_version: "8.34@sha256:67097317623a503ba2a6a7e9ae8db6929a1f7e1bbd88077bacf2d325fbdab923"
# renovate: datasource=docker depName=docker.io/apache/tika
paperless_tika_version: "latest@sha256:90b7fa1dc018434075fce9e1d9b88b1e3d0ea6979d0cf86e116c79a8073ae973"
paperless_port: 8000
paperless_external_port: 10007
paperless_external_url: "https://{{ tailscale_domain }}:{{ paperless_external_port }}"
paperless_db_host: "{{ postgres_host }}"
paperless_db_name: paperless
paperless_db_user: paperless
# "PAPERLESS_SOCIALACCOUNT_PROVIDERS" takes a monster json line:
# https://www.authelia.com/integration/openid-connect/clients/paperless/
# Writing it here, serializing with the to_json filter
paperless_socialaccount_providers:
  openid_connect:
    SCOPE:
      - openid
      - profile
      - email
    OAUTH_PKCE_ENABLED: true
    APPS:
      - provider_id: authelia
        name: Authelia
        client_id: paperless
        secret: "{{ paperless_oidc_client_secret }}"
        settings:
          server_url: "{{ authelia_external_url }}"
          token_auth_method: client_secret_basic
enabled_services:
  - paperless-redis-container.service
  - paperless-gotenberg-container.service
  - paperless-tika-container.service
  - paperless-server-container.service
  - caddy.service
