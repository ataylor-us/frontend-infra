---
- name: Create syncthing config directory
  become: true
  ansible.builtin.file:
    group: 1000
    # This might be a lsio container thing, but it gets set as 700 every container restart
    mode: "0700"
    owner: 1000
    path: "{{ podman_data_dir }}/syncthing"
    state: directory
- name: Create a Quadlet file
  become: true
  containers.podman.podman_container:
    name: syncthing
    hostname: "{{ inventory_hostname }}"
    image: lscr.io/linuxserver/syncthing:{{ syncthing_version }}
    state: quadlet
    quadlet_filename: "{{ project_name }}-container"
    network: host
    volumes:
      - "{{ podman_data_dir }}/syncthing:/config:rw,z"
    env:
      PUID: 1000
      PGID: 1000
      TZ: "{{ timezone }}"
    labels:
      managed-by: ansible
      part-of: "{{ project_name }}"
    quadlet_options: "{{ default_quadlet_options }}"
  notify:
    - Reload systemd for syncthing
    - Restart syncthing
- name: Generate Caddyfile
  become: true
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: "/etc/caddy/conf.d/{{ project_name }}.Caddyfile"
    group: caddy
    mode: "0644"
    owner: caddy
  notify:
    - Reload systemd for syncthing
    - Restart syncthing
- name: Copy borgmatic config
  become: true
  ignore_errors: true
  ansible.builtin.template:
    dest: "/etc/borgmatic.d/{{ project_name }}.yaml"
    group: root
    mode: "0600"
    owner: root
    src: config.yaml.j2
- name: Flush handlers
  ansible.builtin.meta: flush_handlers
