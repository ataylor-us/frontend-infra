---
- name: Create config directories
  become: true
  ansible.builtin.file:
    group: 1000
    mode: "0755"
    owner: 1000
    path: "{{ podman_data_dir }}/yamtrack"
    state: directory
- name: Create config directories
  become: true
  ansible.builtin.file:
    group: 1000
    mode: "0755"
    # The container enforces this gid
    owner: 999
    path: "{{ podman_data_dir }}/yamtrack-redis"
    state: directory
- name: Create a Quadlet file
  become: true
  containers.podman.podman_container:
    name: yamtrack-redis
    image: docker.io/library/redis:{{ yamtrack_redis_version }}
    state: quadlet
    quadlet_filename: yamtrack-redis-container
    network: "{{ default_podman_interface }}"
    volumes:
      - "{{ podman_data_dir }}/yamtrack-redis:/data:rw,z"
    quadlet_options: "{{ default_quadlet_options }}"
  notify:
    - Reload systemd for yamtrack
    - Restart yamtrack
- name: Create a Quadlet file
  become: true
  no_log: true
  containers.podman.podman_container:
    name: yamtrack
    image: ghcr.io/fuzzygrim/yamtrack:{{ yamtrack_version }}
    state: quadlet
    quadlet_filename: yamtrack-container
    network: "{{ default_podman_interface }}"
    ports:
      - 127.0.0.1:{{ yamtrack_port }}:8000
    volumes:
      - "{{ podman_data_dir }}/yamtrack:/yamtrack/db:rw,z"
    env:
      TZ: "{{ timezone }}"
      SECRET: "{{ yamtrack_secret }}"
      REDIS_URL: redis://yamtrack-redis:6379
      TRAKT_API: "{{ yamtrack_trakt_api | default(omit) }}"
      TRAKT_API_SECRET: "{{ yamtrack_trakt_api_secret | default(omit) }}"
    quadlet_options: "{{ default_quadlet_options }}"
  notify:
    - Reload systemd for yamtrack
    - Restart yamtrack
- name: Flush handlers
  ansible.builtin.meta: flush_handlers
- name: Generate Caddyfile
  become: true
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: /etc/caddy/conf.d/yamtrack.Caddyfile
    group: caddy
    mode: "0644"
    owner: caddy
  notify:
    - Reload systemd for yamtrack
    - Restart yamtrack
- name: Flush handlers
  ansible.builtin.meta: flush_handlers
- name: Copy borgmatic config
  become: true
  ignore_errors: true
  ansible.builtin.template:
    dest: /etc/borgmatic.d/yamtrack.yaml
    group: root
    mode: "0600"
    owner: root
    src: config.yaml.j2
