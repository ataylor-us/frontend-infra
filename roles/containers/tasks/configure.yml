---
- name: Create podman data directory
  become: true
  ansible.builtin.file:
    group: root
    mode: "0755"
    owner: root
    path: "{{ podman_data_dir }}"
    state: directory
- name: Ensure podman network is created
  become: true
  containers.podman.podman_network:
    name: "{{ default_podman_interface }}"
    state: present
