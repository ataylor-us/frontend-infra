---
- name: Create a Quadlet file for actual
  become: true
  containers.podman.podman_container:
    name: actual
    image: docker.io/actualbudget/actual-server:{{ actual_version }}
    state: quadlet
    quadlet_filename: "{{ project_name }}-container"
    user: 1000:1000
    env:
      TZ: "{{ timezone }}"
    ports:
      - 127.0.0.1:{{ actual_port }}:5006
    network: "{{ default_podman_interface }}"
    volumes:
      - "{{ service_data_dir }}:/data:rw,rslave"
    labels:
      managed-by: ansible
      part-of: "{{ project_name }}"
    quadlet_options: "{{ nfs_quadlet_options }}"
  notify:
    - Reload systemd for actual
    - Restart actual
- name: Generate Caddyfile
  become: true
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: "/etc/caddy/conf.d/{{ project_name }}.Caddyfile"
    group: caddy
    mode: "0644"
    owner: caddy
  notify:
    - Reload systemd for actual
    - Restart actual
- name: Flush handlers
  ansible.builtin.meta: flush_handlers
# Each budget gets its own group-<slug>.sqlite, so I find them at deploy time. Re-run the play after adding a budget.
- name: Discover Actual SQLite databases
  become: true
  ansible.builtin.find:
    paths:
      - "{{ service_data_dir }}/server-files"
      - "{{ service_data_dir }}/user-files"
    patterns: "*.sqlite"
  register: actual_sqlite_dbs
- name: Copy borgmatic config
  become: true
  ignore_errors: true
  ansible.builtin.template:
    dest: "/etc/borgmatic.d/{{ project_name }}.yaml"
    group: root
    mode: "0600"
    owner: root
    src: config.yaml.j2
