---
- name: Set the hostname
  when: domain_name is defined
  become: true
  ansible.builtin.hostname:
    name: "{{ domain_name }}"
- name: Set timezone
  become: true
  community.general.timezone:
    name: "{{ timezone }}"
- name: Remove mail_badpass from sudoers
  ansible.builtin.replace:
    group: root
    mode: "0440"
    owner: root
    path: /etc/sudoers
    regexp: (^Defaults.*mail_badpass$)|(\,mail_badpass)
    replace: ""
    validate: /usr/sbin/visudo -cf %s
  become: true
- name: Adding pwfeedback
  ansible.builtin.copy:
    content: |
      Defaults        pwfeedback
    dest: /etc/sudoers.d/02-pwfeedback
    group: root
    mode: "0440"
    owner: root
    validate: /usr/sbin/visudo -cf %s
  become: true
- name: Ensure /root/.ssh exists
  become: true
  ansible.builtin.file:
    path: /root/.ssh
    state: directory
    owner: root
    group: root
    mode: "0700"
- name: Set up root SSH key
  become: true
  block:
    - name: Copy root private key
      ansible.builtin.copy:
        src: "{{ inventory_hostname }}/vault_{{ ssh_key_name }}"
        dest: "/root/.ssh/{{ ssh_key_name }}"
        owner: root
        group: root
        mode: "0600"
    - name: Copy root public key
      ansible.builtin.template:
        src: "{{ inventory_hostname }}/{{ ssh_key_name }}.pub.j2"
        dest: "/root/.ssh/{{ ssh_key_name }}.pub"
        owner: root
        group: root
        mode: "0644"
  rescue:
    - name: Generate root keys
      community.crypto.openssh_keypair:
        path: "/root/.ssh/{{ ssh_key_name }}"
        type: ed25519
        owner: root
        group: root
        comment: "root@{{ inventory_hostname }}"
- name: Configure systemd-journald to persist storage
  ansible.builtin.include_role:
    name: persist_journald
    apply:
      become: true
- name: Configure smartd
  become: true
  ansible.builtin.copy:
    src: smartd.conf
    dest: /etc/smartd.conf
    owner: root
    group: root
    mode: "0644"
- name: Create the `aur_builder` user
  become: true
  ansible.builtin.user:
    name: aur_builder
    create_home: true
    group: wheel
- name: Allow the `aur_builder` user to run `sudo pacman` without a password
  become: true
  ansible.builtin.lineinfile:
    path: /etc/sudoers.d/11-install-aur_builder
    line: "aur_builder ALL=(ALL) NOPASSWD: /usr/bin/pacman"
    create: true
    mode: "0644"
    validate: "visudo -cf %s"
- name: Install yay using makepkg
  kewlfft.aur.aur:
    name: yay
    use: makepkg
    state: present
  become: true
  become_user: aur_builder
# TODO: clean this up, it works it needs to be refined
- name: Configure dropbear for remote LUKS unlock
  when: "'encrypted_boot' in group_names"
  become: true
  block:
    - name: Install mkinitcpio packages
      community.general.pacman:
        name:
          - mkinitcpio-dropbear
          - mkinitcpio-netconf
          - mkinitcpio-utils
        state: present
    - name: Ensure /etc/dropbear exists
      ansible.builtin.file:
        path: /etc/dropbear
        state: directory
        owner: root
        group: root
        mode: "0700"
    - name: Generate dropbear ed25519 host key
      ansible.builtin.command:
        cmd: dropbearkey -t ed25519 -f /etc/dropbear/dropbear_ed25519_host_key
        creates: /etc/dropbear/dropbear_ed25519_host_key
      notify: Rebuild initramfs
    - name: Write dropbear authorized key
      ansible.builtin.copy:
        content: "{{ dropbear_authorized_key }}\n"
        dest: /etc/dropbear/root_key
        owner: root
        group: root
        mode: "0600"
      notify: Rebuild initramfs
    # Workaround: encryptssh install script still references 11-dm-initramfs.rules which was removed from mkinitcpio
    - name: Patch encryptssh install script
      ansible.builtin.lineinfile:
        path: /usr/lib/initcpio/install/encryptssh
        regexp: '11-dm-initramfs.rules'
        state: absent
    - name: Insert netconf dropbear encryptssh hooks
      ansible.builtin.replace:
        path: /etc/mkinitcpio.conf
        regexp: '(netconf\s+)?(dropbear\s+)?(encryptssh|encrypt)\b'
        replace: netconf dropbear encryptssh
      notify: Rebuild initramfs
    - name: Find systemd-boot entries
      ansible.builtin.find:
        paths: /boot/loader/entries
        patterns: "*.conf"
      register: boot_entries
    - name: Add ip= to kernel cmdline
      ansible.builtin.replace:
        path: "{{ item.path }}"
        regexp: '^(options\b(?!.*\bip=).+)$'
        replace: '\1 ip=:::::eth0:dhcp'
      loop: "{{ boot_entries.files }}"
    - name: Update ip= on kernel cmdline
      ansible.builtin.replace:
        path: "{{ item.path }}"
        regexp: '\bip=\S+'
        replace: 'ip=:::::eth0:dhcp'
      loop: "{{ boot_entries.files }}"
